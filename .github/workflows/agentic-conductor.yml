#
# Mentions @copilot to run the pr-conductor: reconcile the AI-reviewer threads and
# post a machine-readable agentic-check comment. The @copilot mention continues the
# gpt-5.5 session the escalation task seeded on this PR, so the conductor runs on
# gpt-5.5, and the repo copilot-instructions route the task to the /pr-conductor
# skill. agentic-apply.yml then reacts to the posted comment (no polling here).
#
# Triggers:
#   pull_request_review submitted by a bot reviewer -> the review round finished:
#     run the conductor (the BASELINE on the first review, a re-check on later ones).
#   synchronize -> a new commit was pushed: re-check whether findings are now fixed.
#   review comment from a human -> a developer rebuttal to re-adjudicate.
# It does NOT run on open (nothing to reconcile until the reviewers have posted).
#
# Runs as REVIEWER_PAT_GENERAL (write + a Copilot seat, to drive @copilot).
---
name: Agentic Conductor (reconcile)

"on":
  pull_request:
    types: [synchronize]
  pull_request_review:
    types: [submitted]

permissions: {}

concurrency:
  group: agentic-conductor-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reconcile:
    # A new commit (synchronize) always; a submitted review only from a bot reviewer
    # (the native Copilot review / pi finishing). We do NOT trigger on individual
    # review comments: the code-review bot's inline comments would each spawn a run
    # gated as action_required (the coding-agent approval toggle does not cover the
    # review bot). Developer rebuttals are read by the conductor whenever it next
    # runs, so nothing is lost.
    if: >-
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review' && github.event.review.user.type == 'Bot')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REVIEWER_PAT_GENERAL }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Guard PAT
        run: |
          [ -n "$GH_TOKEN" ] || { echo "::error::REVIEWER_PAT_GENERAL not set"; exit 1; }

      - name: Mention @copilot to run the pr-conductor
        run: |
          gh api "repos/$REPO/issues/$PR/comments" \
            -f body="@copilot Reconcile the AI-reviewer threads on this pull request against the latest commits and any developer replies, following the repository instructions." \
            --jq '.html_url'
