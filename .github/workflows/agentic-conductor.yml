#
# Runs the pr-conductor after each review round: it re-requests the native review for
# the new head, waits (polling, read-only) until every AI reviewer has posted for the
# CURRENT commit, then fires an Agent Tasks API task to reconcile the threads. The
# repo copilot-instructions route the task to the /pr-conductor skill, and
# agentic-apply.yml reacts to the posted agentic-check comment.
#
# Why a task and not an @copilot mention: a mention resumes the PR's existing agent
# task only while the PR head still matches the last session's workspace. Every
# conductor round after the baseline follows a push, so a mention would mint a fresh
# task on the DEFAULT agent model anyway — losing the gpt-5.5 pin. Firing the task
# ourselves keeps the model pinned per round, and a plain informational comment tells
# the engineer what is happening without invoking the bot in the thread.
#
# Why trigger on the developer events (opened, synchronize) and POLL for the reviews,
# instead of triggering on pull_request_review: every event from the Copilot review
# bot (copilot-pull-request-reviewer) is gated action_required — the "require approval
# for Copilot workflow runs" toggle covers the coding agent (copilot-swe-agent), not
# the review bot. Developer events are un-gated, so we start freely and observe the
# review rather than being triggered by it.
#
# Runs as REVIEWER_PAT_GENERAL (write + a Copilot seat, to request reviewers and drive
# @copilot).
---
name: Agentic Conductor (reconcile)

"on":
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

concurrency:
  # Per PR, cancel in progress: if a newer commit lands mid-poll, abandon this run and
  # let the new head's run take over, so we never fire a conductor for a stale head.
  group: agentic-conductor-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REVIEWER_PAT_GENERAL }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Guard PAT
        run: |
          [ -n "$GH_TOKEN" ] || { echo "::error::REVIEWER_PAT_GENERAL not set"; exit 1; }

      - name: Mark the head not-yet-clean (block the gate until the conductor judges)
        run: |
          # Every new head starts blocked, from the first seconds of this run, so there
          # is never a window where the PR looks mergeable before the baseline lands.
          # apply.yml overwrites this with the real failure/success once the conductor
          # posts its agentic-check. pending (not failure) because it is not yet judged.
          gh api --method POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=pending -f context=agentic-review/clean \
            -f description="conductor: awaiting first review" >/dev/null
          echo "agentic-review/clean = pending (awaiting conductor)"

      - name: Request the native review for the current head
        run: |
          # On a new commit the diff changed, so this triggers a fresh pass; on open it
          # is the first request. Best-effort: it may already be requested.
          gh api --method POST "repos/$REPO/pulls/$PR/requested_reviewers" \
            -f "reviewers[]=copilot-pull-request-reviewer[bot]" >/dev/null 2>&1 \
            && echo "requested native review" \
            || echo "::notice::native review not (re-)requested (already pending, or unchanged diff)"

      - name: Wait for all AI reviewers to finish for the current head
        run: |
          # AI reviewers to wait for, as login regexes. Add 'github-actions' when pi is
          # enabled on the repo. We wait only for AI reviewers; humans review on their
          # own clock and the conductor never touches human threads.
          REVIEWERS='copilot-pull-request-reviewer'
          echo "waiting for [$REVIEWERS] to review head $HEAD_SHA"
          missing="$REVIEWERS"
          for _ in $(seq 1 48); do   # ~12 min at 15s
            missing=""
            for rv in $REVIEWERS; do
              # Emit one line per matching review across ALL pages, then count lines.
              # (gh --paginate applies --jq per page, so `[...] | length` would print
              # one count per page and break the numeric test once reviews span pages.)
              done_n=$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate \
                --jq ".[] | select((.user.login|test(\"$rv\";\"i\")) and .commit_id==\"$HEAD_SHA\") | .id" \
                2>/dev/null | grep -c . || true)
              [ "${done_n:-0}" -gt 0 ] || missing="$missing $rv"
            done
            if [ -z "$missing" ]; then echo "all AI reviewers done for head"; break; fi
            echo "  still waiting on:$missing"
            sleep 15
          done
          if [ -n "$missing" ]; then
            echo "::warning::timed out waiting for reviewers:$missing — firing conductor with the reviews present"
          fi

      - name: Announce the round and fire the reconcile task (gpt-5.5)
        run: |
          # Informational comment only — no bot mention. The task below does the work.
          gh api "repos/$REPO/issues/$PR/comments" \
            -f body="The LFX reviewer cloud agent is reconciling the AI-reviewer threads on this pull request against the latest commit and any developer replies." \
            --jq '.html_url'
          TID=$(gh api "/agents/repos/$REPO/tasks" \
            -H "X-GitHub-Api-Version: 2026-03-10" --method POST \
            -f model=gpt-5.5 -F create_pull_request=false \
            -f base_ref="$BASE_REF" -f head_ref="$HEAD_REF" \
            -f prompt="Reconcile the AI-reviewer threads on pull request #$PR in $REPO against the latest commit and any developer replies, following the repository instructions exactly. Post your agentic-check verdict comment using the add_issue_comment tool." \
            --jq '.id')
          echo "reconcile task: $TID (agentic-apply reacts to its agentic-check comment)"
