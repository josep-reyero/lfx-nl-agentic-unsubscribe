#
# Triggers the conductor to reconcile the AI-reviewer threads. It fires on a new
# commit (synchronize) and on a developer's review reply (a possible rebuttal), but
# NOT on open — at open there are no fixes to verify yet (escalation runs then).
# It posts a generic @copilot comment as a user with write + a Copilot seat
# (REVIEWER_PAT); that comment continues the gpt-5.5 session the escalation task
# seeded, so the conductor runs on gpt-5.5 with the escalation's context, and the
# repo copilot-instructions route the task to the conductor agent.
---
name: Agentic Conductor (reconcile)

"on":
  pull_request:
    types: [synchronize]
  pull_request_review_comment:
    types: [created]

permissions: {}

concurrency:
  group: agentic-conductor-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reconcile:
    # synchronize always; review replies only from a human (skip the reviewer bots
    # and the conductor's own replies, which are type Bot).
    if: >-
      github.event_name == 'pull_request' ||
      github.event.comment.user.type == 'User'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REVIEWER_PAT_GENERAL }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Guard PAT
        run: |
          [ -n "$GH_TOKEN" ] || { echo "::error::REVIEWER_PAT_GENERAL not set"; exit 1; }
      - name: Post @copilot conductor directive
        run: |
          gh api "repos/$REPO/issues/$PR/comments" \
            -f body="@copilot Reconcile the AI-reviewer threads on this pull request against the latest commits and any developer rebuttals, following the repository instructions." \
            --jq '.html_url'
