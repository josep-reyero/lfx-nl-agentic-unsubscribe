#
# The gate: the only workflow that reaches a merge verdict. No model runs here. It
# re-derives from the PR's CURRENT head and, when agentic-review/clean is success
# and the needs-human label is absent, records an "approve" verdict.
#
# It triggers on the signals the deterministic apply layer produces with a PAT
# (agentic-review/clean status, the needs-human label, thread resolves). PAT-
# generated events DO start workflows, unlike GITHUB_TOKEN ones, so triggering on
# status / labeled / review_thread fires reliably. It re-derives from the current
# head, so a PR that advanced past the reviewed SHA fails closed.
#
# Guarded by the AGENTIC_GATE_ENABLED repo variable (shadow mode until 'true').
#
# TEST VARIANT: production posts an approving review as the lfx-reviewer machine
# user (a non-author with write + a seat). This test repo's PRs are authored by the
# same user that would approve, and GitHub forbids self-approval, so here the gate
# records its verdict as a label (agentic-approved / agentic-blocked) to prove it
# fired and reached the right verdict end to end. A human still gives the review.
---
name: Agentic Gate

"on":
  status: {}
  pull_request:
    types: [labeled, unlabeled]
  pull_request_review_thread:
    types: [resolved, unresolved]

concurrency:
  group: gate-${{ github.event.pull_request.number || github.event.sha || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          EVENT_SHA: ${{ github.event.sha }}
        run: |
          set -euo pipefail
          PR=""
          if [ -n "$EVENT_PR" ]; then
            PR="$EVENT_PR"
          elif [ -n "$EVENT_SHA" ]; then
            # status event: map the commit to its single open PR, else fail closed.
            PRS="$(gh api "repos/$REPO/commits/$EVENT_SHA/pulls" \
                    --jq '.[] | select(.state=="open") | .number' 2>/dev/null || true)"
            COUNT="$(printf '%s\n' "$PRS" | grep -c . || true)"
            if [ "${COUNT:-0}" -ne 1 ]; then
              echo "status maps to ${COUNT:-0} open PR(s); need exactly one. Not gating."
              echo "found=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
            PR="$PRS"
          fi
          if [ -z "$PR" ]; then echo "found=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          HEAD="$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid)"
          { echo "pr=$PR"; echo "head=$HEAD"; echo "found=true"; } >> "$GITHUB_OUTPUT"

      - name: Evaluate gate
        id: gate
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pr }}
          HEAD: ${{ steps.pr.outputs.head }}
        run: |
          set -euo pipefail
          CLEAN="$(gh api "repos/$REPO/commits/$HEAD/status" \
                    --jq '.statuses[] | select(.context=="agentic-review/clean") | .state' \
                    2>/dev/null | head -1 || true)"
          NEEDS_HUMAN="$(gh pr view "$PR" --repo "$REPO" --json labels \
                          --jq 'any(.labels[].name; . == "needs-human")')"
          echo "clean=$CLEAN needs-human=$NEEDS_HUMAN (head $HEAD)" >> "$GITHUB_STEP_SUMMARY"
          if [ "$CLEAN" = "success" ] && [ "$NEEDS_HUMAN" != "true" ]; then
            echo "approve=true" >> "$GITHUB_OUTPUT"
          else
            echo "approve=false" >> "$GITHUB_OUTPUT"
            echo "Withholding approval." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Shadow mode (gate disabled)
        if: steps.gate.outputs.approve == 'true' && vars.AGENTIC_GATE_ENABLED != 'true'
        run: |
          echo "Gate WOULD approve PR #${{ steps.pr.outputs.pr }} (clean, no needs-human)." >> "$GITHUB_STEP_SUMMARY"
          echo "AGENTIC_GATE_ENABLED != 'true'; nothing posted (shadow mode)." >> "$GITHUB_STEP_SUMMARY"

      - name: Record approving verdict (label — test variant)
        if: steps.gate.outputs.approve == 'true' && vars.AGENTIC_GATE_ENABLED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pr }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --remove-label "agentic-blocked" --add-label "agentic-approved" || \
            gh pr edit "$PR" --repo "$REPO" --add-label "agentic-approved"
          echo "Gate verdict: APPROVE (production would post the approving review as lfx-reviewer)." >> "$GITHUB_STEP_SUMMARY"

      - name: Record withheld verdict (label)
        if: steps.gate.outputs.approve == 'false' && steps.pr.outputs.found == 'true' && vars.AGENTIC_GATE_ENABLED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pr }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --remove-label "agentic-approved" --add-label "agentic-blocked" || \
            gh pr edit "$PR" --repo "$REPO" --add-label "agentic-blocked"
          echo "Gate verdict: WITHHOLD. Labeled 'agentic-blocked'." >> "$GITHUB_STEP_SUMMARY"
