name: tmp-resolve-probe
"on":
  workflow_dispatch:
    inputs:
      thread_id:
        required: true
        type: string
      with_contents:
        required: true
        type: string
permissions: {}
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions: ${{ inputs.with_contents == 'yes' && fromJSON('{"pull-requests":"write","contents":"read"}') || fromJSON('{"pull-requests":"write"}') }}
    env:
      GH_TOKEN: ${{ github.token }}
      TID: ${{ inputs.thread_id }}
    steps:
      - run: |
          echo "permset with_contents=${{ inputs.with_contents }}"
          echo "--- unresolve ---"
          gh api graphql -f query='mutation($id:ID!){unresolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$TID" 2>&1 || true
          echo "--- resolve ---"
          gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$TID" 2>&1 || true
