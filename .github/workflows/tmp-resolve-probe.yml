name: tmp-resolve-probe
"on":
  workflow_dispatch:
    inputs:
      thread_id:
        required: true
        type: string
permissions: {}
jobs:
  with-contents:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      TID: ${{ inputs.thread_id }}
    steps:
      - run: |
          echo "== permset A: pull-requests:write + contents:read =="
          gh api graphql -f query='mutation($id:ID!){unresolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$TID" 2>&1 || true
          gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$TID" 2>&1 || true
  pr-only:
    runs-on: ubuntu-latest
    needs: with-contents
    permissions:
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      TID: ${{ inputs.thread_id }}
    steps:
      - run: |
          echo "== permset B: pull-requests:write only =="
          gh api graphql -f query='mutation($id:ID!){unresolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$TID" 2>&1 || true
          gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$TID" 2>&1 || true
