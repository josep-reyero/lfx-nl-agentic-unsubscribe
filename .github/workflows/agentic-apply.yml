#
# Reactive write layer. The escalation and reconcile agent tasks produce only
# comments; every GitHub write is done here, keyed to a comment authored by the
# trusted agent identity so a developer cannot forge a verdict:
#   - a `needs-human: yes` comment  -> set the sticky needs-human label
#   - an `<!-- agentic:check v1 -->` block -> resolve the threads it marks fixed /
#     rebutted-valid, and set the agentic-review/clean commit status on the SHA the
#     block carries in `head:` (the commit the conductor actually judged).
#
# TRUST IDENTITY: the agents post via the writable GitHub MCP, which authenticates
# with the COPILOT_MCP_GITHUB_PERSONAL_ACCESS_TOKEN, so their comments are authored
# by that PAT's OWNER (not copilot-swe-agent). In production that PAT MUST belong to
# a dedicated machine account no developer controls, so these comments are
# unforgeable. In this test the owner is josep-reyero (also the PR author), so the
# boundary is degenerate self-trust — fine for validating the plumbing only.
#
# This runs on the agent's verdict comment. Because the agents post via the MCP
# PAT, the comment — and therefore this run — is attributed to the PAT owner,
# NOT to a Copilot actor, so Copilot workflow gating never applies and we can
# react instead of polling. It runs from the default branch (trusted code, not
# anything the agent wrote).
#
# Writes use REVIEWER_PAT_GENERAL (needs Issues, Pull requests, and Commit statuses
# read/write). The comment body is passed via env, never interpolated into the run
# script, to avoid script injection.
---
name: Agentic Apply

"on":
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: agentic-apply-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    # Only PR comments authored by the trusted agent identity (the MCP PAT owner)
    # are acted on. Production: a dedicated machine account. Test: josep-reyero.
    if: >-
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'josep-reyero'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REVIEWER_PAT_GENERAL }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.issue.number }}
      BODY: ${{ github.event.comment.body }}
    steps:
      - name: Set sticky needs-human label
        run: |
          # Match the exact hidden marker from /agentic-comment-format, not any
          # prose that happens to contain "needs-human: yes".
          if printf '%s' "$BODY" | grep -qiE '<!--[[:space:]]*needs-human:[[:space:]]*yes[[:space:]]*-->'; then
            present=$(gh api "repos/$REPO/issues/$PR/labels" --jq '[.[].name] | index("needs-human")')
            if [ "$present" = "null" ] || [ -z "$present" ]; then
              gh api --method POST "repos/$REPO/issues/$PR/labels" -f "labels[]=needs-human"
              echo "needs-human label set"
            else
              echo "needs-human already present (sticky) — no-op"
            fi
          fi
      - name: Apply agentic-check (resolve threads + set status)
        run: |
          printf '%s' "$BODY" | grep -q '<!-- agentic:check v1 -->' || { echo "no agentic-check block; skip"; exit 0; }

          # Parse ONLY the machine block (from its marker to the end of the
          # comment, where /agentic-comment-format puts it), so prose in the
          # human summary that happens to start a line with "head:", "clean:",
          # or "- id:" can never steer the verdict or the thread actions.
          BLOCK=$(printf '%s\n' "$BODY" | sed -n '/<!-- agentic:check v1 -->/,$p')

          # Set the status on the SHA the verdict was produced for (carried in the
          # block as `head:`), NOT the PR's current head. Otherwise a commit that
          # races in between the verdict and this run could mark a newer, unreviewed
          # head clean. If the SHA differs from the current head, the gate re-derives
          # from the current head (still pending) and fails closed — which is correct.
          TARGET_SHA=$(printf '%s' "$BLOCK" | grep -iE '^[[:space:]]*head:[[:space:]]*[0-9a-f]{7,40}[[:space:]]*$' | head -1 | grep -oiE '[0-9a-f]{7,40}' | head -1)
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA=$(gh api "repos/$REPO/pulls/$PR" --jq '.head.sha')
            echo "::warning::agentic-check block carries no head:; falling back to current head $TARGET_SHA"
          fi
          # Anchored to the whole line, like head:, so prose mentioning "clean:"
          # outside the machine block can never set the verdict.
          CLEAN=$(printf '%s' "$BLOCK" | grep -iE '^[[:space:]]*clean:[[:space:]]*(true|false)[[:space:]]*$' | head -1 | grep -oiE 'true|false' | tr '[:upper:]' '[:lower:]')
          echo "target=$TARGET_SHA clean=$CLEAN"

          # Act on each thread the conductor listed. Non-blocking states get resolved;
          # still-blocking states get re-opened if they were resolved prematurely, so
          # the thread state can never contradict the gate (which reads this block).
          printf '%s\n' "$BLOCK" | grep -E '^[[:space:]]*-[[:space:]]*id:' | while IFS= read -r line; do
            # Fields are comma-separated (id, status, severity, reason). Drop the
            # free-text reason before extracting, so a sentence mentioning "id:" or
            # "status:" can never pollute the fields, and exclude commas from the
            # captures so the separators are not swallowed.
            meta=${line%%reason:*}
            tid=$(printf '%s' "$meta" | sed -nE 's/.*id:[[:space:]]*([^[:space:],]+).*/\1/p')
            st=$(printf '%s' "$meta" | sed -nE 's/.*status:[[:space:]]*([^[:space:],]+).*/\1/p')
            case "$st" in
              fixed|obsolete|rebutted-valid)
                # shellcheck disable=SC2016  # $id is a GraphQL variable, not a shell expansion
                if gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$tid" >/dev/null 2>&1; then
                  echo "resolved $tid ($st)"
                else
                  echo "::warning::could not resolve thread $tid"
                fi ;;
              outstanding|rebutted-invalid)
                # shellcheck disable=SC2016  # $id is a GraphQL variable, not a shell expansion
                if gh api graphql -f query='mutation($id:ID!){unresolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$tid" >/dev/null 2>&1; then
                  echo "kept open $tid ($st)"
                else
                  echo "::warning::could not unresolve thread $tid"
                fi ;;
              *) : ;;
            esac
          done

          STATE=failure
          [ "$CLEAN" = "true" ] && STATE=success
          gh api --method POST "repos/$REPO/statuses/$TARGET_SHA" \
            -f state="$STATE" -f context=agentic-review/clean \
            -f description="conductor: clean=$CLEAN"
          echo "agentic-review/clean = $STATE on $TARGET_SHA"
