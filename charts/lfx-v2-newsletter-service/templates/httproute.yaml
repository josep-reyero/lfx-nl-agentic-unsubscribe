{{- if .Values.httpRoute.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.lfx.namespace }}
  labels:
    {{- include "lfx-v2-newsletter-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.traefik.gateway.name }}
      namespace: {{ .Values.traefik.gateway.namespace }}
  hostnames:
    - "lfx-api.{{ .Values.lfx.domain }}"
  rules:
    # Newsletter endpoints are project-scoped:
    #   /projects/{project_uid}/newsletters[/<rest>]
    #   /projects/{project_uid}/newsletter-opens/{newsletter_uid}
    # plus the top-level recipient-facing unsubscribe route:
    #   /newsletters/unsubscribe
    # Gateway API's `RegularExpression` path-match type lets us pluck the
    # newsletter-owned subset out of the `/projects/...` URL space without
    # routing every project sub-path here (project-service owns the rest).
    # Requires a Gateway implementation with RegularExpression support
    # (Traefik >= 2.10).
    - matches:
        - path:
            type: RegularExpression
            value: "^/projects/[^/]+/newsletters(/.*)?$"
        - path:
            type: RegularExpression
            value: "^/projects/[^/]+/newsletter-opens/[^/]+$"
        - path:
            type: RegularExpression
            value: "^/newsletters/unsubscribe$"
      {{- if .Values.heimdall.enabled }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: heimdall-forward-body
      {{- end }}
      backendRefs:
        - group: ''
          kind: Service
          name: {{ .Chart.Name }}
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
