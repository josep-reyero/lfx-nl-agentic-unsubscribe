{{- if .Values.heimdall.enabled }}
---
apiVersion: heimdall.dadrus.github.com/v1alpha4
kind: RuleSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-v2-newsletter-service.labels" . | nindent 4 }}
spec:
  rules:
    # ---------------------------------------------------------------------
    # Newsletter CRUD (project-scoped). FGA gates by `project:{project_uid}`
    # extracted from the URL path. Writes require `writer`; reads require
    # `viewer`. Pattern mirrors lfx-v2-committee-service.
    # ---------------------------------------------------------------------
    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:create"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - POST
        routes:
          - path: /projects/:project_uid/newsletters
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: writer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:list"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
        routes:
          - path: /projects/:project_uid/newsletters
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: viewer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:get"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
        routes:
          - path: /projects/:project_uid/newsletters/:newsletter_uid
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: viewer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:update"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - PUT
        routes:
          - path: /projects/:project_uid/newsletters/:newsletter_uid
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: writer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:delete"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - DELETE
        routes:
          - path: /projects/:project_uid/newsletters/:newsletter_uid
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: writer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:send"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - POST
        routes:
          - path: /projects/:project_uid/newsletters/:newsletter_uid/send
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: writer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    # ---------------------------------------------------------------------
    # Recipient resolution + test send. Recipient queries are reads (viewer);
    # test-send is a write (writer).
    # ---------------------------------------------------------------------
    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:recipient_count"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - POST
        routes:
          - path: /projects/:project_uid/newsletters/recipient-count
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: viewer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:recipients"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - POST
        routes:
          - path: /projects/:project_uid/newsletters/recipients
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: viewer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:test_send"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - POST
        routes:
          - path: /projects/:project_uid/newsletters/test-send
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: writer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    # ---------------------------------------------------------------------
    # Per-newsletter analytics.
    # ---------------------------------------------------------------------
    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:analytics"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
        routes:
          - path: /projects/:project_uid/newsletters/:newsletter_uid/analytics
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: openfga_check
          config:
            values:
              relation: viewer
              object: "project:{{ "{{- .Request.URL.Captures.project_uid -}}" }}"
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    # ---------------------------------------------------------------------
    # Open-tracking pixel: intentionally unauthenticated. Recipients open
    # newsletters in email clients with no session. Identity is established
    # via the SHA-256 recipient_hash query parameter, validated server-side.
    # The project_uid in the path is also validated by the handler against
    # the persisted newsletter's project_uid; a tampered URL is silently
    # dropped (pixel still returns 200).
    # ---------------------------------------------------------------------
    - id: "rule:lfx:lfx-v2-newsletter-service:newsletter_opens:pixel"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - HEAD
        routes:
          - path: /projects/:project_uid/newsletter-opens/:newsletter_uid
      execute:
        - authorizer: allow_all

    # ---------------------------------------------------------------------
    # One-click unsubscribe: intentionally unauthenticated. Recipients click
    # the footer link from their mail client with no session. Authorization
    # comes from the HMAC-signed `t` query parameter, verified server-side.
    # ---------------------------------------------------------------------
    - id: "rule:lfx:lfx-v2-newsletter-service:newsletters:unsubscribe"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - HEAD
        routes:
          - path: /newsletters/unsubscribe
      execute:
        - authorizer: allow_all
{{- end }}
