{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-v2-newsletter-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lfx-v2-newsletter-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP traffic to the service port from anywhere in the cluster
    # (API gateway / lfx-v2-ui proxy). Restrict further via namespace
    # selectors once the gateway topology stabilizes.
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # OpenTelemetry collector (gRPC and HTTP)
    - ports:
        - port: {{ .Values.networkPolicy.otelGRPCPort }}
          protocol: TCP
        - port: {{ .Values.networkPolicy.otelHTTPPort }}
          protocol: TCP
    # PostgreSQL (CloudNativePG cluster or external)
    - ports:
        - port: {{ .Values.networkPolicy.postgresPort }}
          protocol: TCP
    # Upstream HTTP services (committee, project) and JWKS endpoint over HTTPS.
    # Wide-open HTTPS is acceptable for this PoC; tighten with namespace selectors
    # once API gateway topology stabilizes.
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
{{- end }}
