# image is the configuration for the container image.
image:
  # repository is the container image repository.
  repository: ghcr.io/linuxfoundation/lfx-v2-newsletter-service/newsletter-api
  # tag overrides appVersion from Chart.yaml when set.
  tag: ""
  # pullPolicy is the image pull policy.
  pullPolicy: IfNotPresent

# replicaCount is the number of deployment replicas.
replicaCount: 1

# podAnnotations are additional annotations applied to the pod template.
podAnnotations: {}

# podLabels are additional labels applied to the pod template.
podLabels: {}

# podDisruptionBudget configures a PDB for the deployment.
# Only one of minAvailable or maxUnavailable may be set.
podDisruptionBudget:
  enabled: false
  # minAvailable: 1

# resources is the container resource request and limit configuration.
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# service is the Kubernetes Service configuration.
service:
  enabled: true
  # port is the service port.
  port: 8080

# app is runtime configuration passed as environment variables.
app:
  # logLevel is the log level: debug, info, warn, or error.
  logLevel: info

  # nats is the NATS connection used by the email dispatcher, committee
  # member client, and project metadata client. Newsletter-service makes no
  # HTTP upstream calls — recipient resolution, project metadata lookup, and
  # email send are all NATS request/reply.
  nats:
    url: "nats://lfx-platform-nats.lfx.svc.cluster.local:4222"
    # timeout / maxReconnect / reconnectWait fall back to the app defaults
    # (10s / unlimited / 2s) when empty.
    timeout: ""
    maxReconnect: ""
    reconnectWait: ""

  # send tunes the per-recipient send loop.
  send:
    # fanoutEnabled toggles real email dispatch. When false the orchestrator
    # validates inputs and resolves recipients but does NOT call the
    # email-service NATS subject — useful for dev/staging shake-out of the
    # recipient-resolution path without sending real mail.
    fanoutEnabled: true
    # concurrency caps in-flight email-service requests during fan-out.
    # Empty string falls back to the app default (5).
    concurrency: ""

  # unsubscribe configures the per-recipient one-click opt-out link
  # embedded in the email footer. publicBaseURL is the externally-reachable
  # origin of this service; the HMAC secret signs the token so links can't
  # be forged. Optional: when both are unset the footer falls back to the
  # legacy "reply with UNSUBSCRIBE" copy. To enable links, set BOTH (the
  # app rejects setting only one of the pair).
  unsubscribe:
    publicBaseURL: ""
    # secret sets the HMAC key directly (local/dev only). Prefer secretRef.
    secret: ""
    # secretRef sources the HMAC key from a Kubernetes Secret.
    secretRef:
      name: ""
      key: "unsubscribe-secret"

  # jwksURL is the URL of the JWKS endpoint used to verify inbound JWTs.
  # REQUIRED when requireUserAuth=true (default).
  jwksURL: ""

  # audience is the required `aud` claim for inbound JWTs. Must match the
  # value Heimdall sets via the create_jwt finalizer (templates/ruleset.yaml).
  audience: ""

  # use_oidc_contextualizer toggles Heimdall's OIDC contextualizer in the
  # rendered RuleSet.
  use_oidc_contextualizer: true

  # requireUserAuth toggles JWT validation. Disable only for local development.
  requireUserAuth: true

  # extraEnv allows injecting additional environment variables into the container.
  extraEnv: []

  # otel is the configuration for OpenTelemetry observability.
  otel:
    serviceName: "lfx-v2-newsletter-service"
    protocol: "grpc"
    endpoint: ""
    insecure: "false"
    tracesExporter: "none"
    tracesSampleRatio: "1.0"
    metricsExporter: "none"
    logsExporter: "none"
    propagators: "tracecontext,baggage,jaeger"

# database configures the PostgreSQL backend.
database:
  # mode selects the database provider:
  #   "external"         — connect to an existing PostgreSQL instance via a
  #                        Kubernetes Secret containing a DATABASE_URL.
  #   "database"         — create a CloudNativePG Database CR pointing at an
  #                        existing Cluster (e.g. provisioned by the umbrella
  #                        chart). Use this mode when deploying via the umbrella.
  #   "cluster+database" — create both a CloudNativePG Cluster CR and a Database
  #                        CR. Use this mode when deploying the chart standalone
  #                        without an umbrella.
  mode: external

  # cloudNativePG configures access to a CloudNativePG Cluster (modes:
  # "database" and "cluster+database").
  cloudNativePG:
    # clusterName is the name of the CloudNativePG Cluster resource. The
    # CloudNativePG operator creates secrets named <clusterName>-app and
    # <clusterName>-superuser. In "cluster+database" mode the cluster is
    # provisioned by this chart under this name; in "database" mode the cluster
    # must already exist (e.g. created by the umbrella chart).
    clusterName: ""
    # databaseName is the PostgreSQL database within the cluster to connect to.
    databaseName: newsletters
    # cluster is used only in "cluster+database" mode to configure the
    # CloudNativePG Cluster resource provisioned by this chart.
    cluster:
      instances: 1
      storage:
        size: 1Gi

  # external configures an existing PostgreSQL connection (mode: external only).
  external:
    # secretName is the name of the Kubernetes Secret to read the DSN from.
    secretName: ""
    # shape selects how the DSN is read from the secret:
    #   "url"    — read a single DATABASE_URL env var from `secretKey` (default).
    #              Use when the secret has a single key holding a libpq URL.
    #   "fields" — read host/port/username/password/dbname as separate
    #              PGHOST/PGPORT/PGUSER/PGPASSWORD/PGDATABASE env vars from the
    #              keys mapping below. Use with the LFX RDS-via-ESO pattern
    #              where AWS Secrets Manager provides one key per JSON field.
    shape: "url"
    # secretKey is the secret key holding the libpq URL (shape: url only).
    secretKey: "url"
    # keys maps each DSN field to a secret key (shape: fields only). Defaults
    # match the AWS RDS standard JSON layout produced by the
    # SecretsManagerRDSPostgreSQLRotationSingleUser rotation Lambda.
    keys:
      host: host
      port: port
      username: username
      password: password
      dbname: dbname

# serviceAccount is the configuration for the Kubernetes ServiceAccount.
serviceAccount:
  create: true
  name: "lfx-v2-newsletter-service"
  annotations: {}

# networkPolicy controls the Kubernetes NetworkPolicy for this workload.
# Allows egress to OTel, upstream HTTP services, and Postgres.
networkPolicy:
  enabled: true
  otelGRPCPort: 4317
  otelHTTPPort: 4318
  postgresPort: 5432

# httpRoute toggles the Gateway API HTTPRoute (templates/httproute.yaml).
# Disable when deploying behind a different ingress (e.g. plain Service +
# NodePort for local dev).
httpRoute:
  enabled: true

# lfx is the configuration for the LFX platform context.
lfx:
  # domain is the base domain used to build the hostname (lfx-api.<domain>).
  domain: k8s.orb.local
  # namespace is the target namespace for routing resources (HTTPRoute).
  namespace: lfx

# traefik configures the Gateway API parent reference for the HTTPRoute.
traefik:
  gateway:
    name: lfx-platform-gateway
    namespace: lfx

# heimdall configures the Heimdall authorization sidecar / ruleset.
heimdall:
  # enabled toggles both the HTTPRoute ExtensionRef filter and the RuleSet
  # template (templates/ruleset.yaml). Disable for local-only deployments
  # that don't have Heimdall installed.
  enabled: true
  # url is the Heimdall forwardAuth endpoint (consumed by the Traefik
  # middleware when add_middleware=true).
  url: http://lfx-platform-heimdall.lfx.svc.cluster.local:4456
  # jwksUrl is the JWKS endpoint Heimdall serves the JWTs it signs.
  jwksUrl: http://lfx-platform-heimdall.lfx.svc.cluster.local:4457/.well-known/jwks
  # add_middleware renders the Traefik Middleware CRDs (heimdall-forward-body
  # / heimdall). Leave false when another chart owns the middleware.
  add_middleware: false

# openfga configures OpenFGA fine-grained authorization. The newsletter
# RuleSet currently authorizes via service-layer checks rather than direct
# OpenFGA lookups, so this is reserved for future use.
openfga:
  enabled: false

# externalSecretsOperator gates the ExternalSecret + SecretStore templates.
# Defaults to disabled; enable when wiring NATS or other AWS-Secrets-Manager
# backed credentials.
externalSecretsOperator:
  enabled: false
  externalSecret:
    refreshInterval: "1h"
    # data is a list of { secretKey, remoteRef: { key, property? } } entries.
    data: []

# global is the umbrella-chart scope. awsRegion gates ExternalSecret /
# SecretStore rendering and is normally set by the parent chart.
global:
  awsRegion: ""
